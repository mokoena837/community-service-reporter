<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - Community Service Reporter</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'reports/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>COMMUNITY SERVICE REPORTER</h1>
            <p>Report and track service delivery issues in your community</p>
        </div>
        
        <div class="card">
            {% if messages %}
                {% for message in messages %}
                    <div class="message">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>ISSUE CATEGORY</label>
                    <select name="category" required>
                        <option value="">Select category</option>
                        <option value="pothole">Pothole</option>
                        <option value="water_leak">Water Leak</option>
                        <option value="electricity">Electricity Fault</option>
                        <option value="waste">Waste Collection</option>
                        <option value="street_light">Street Light Outage</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>LOCATION</label>
                    <input type="text" name="location" placeholder="Street address or landmark" required>
                </div>
                
                <div class="form-group">
                    <label>DESCRIPTION</label>
                    <textarea name="description" rows="5" placeholder="Describe the problem in detail" required></textarea>
                </div>
                
                <div class="form-group">
                    <label>PHOTO (OPTIONAL)</label>
                    <input type="file" name="photo" id="photo" accept="image/*">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    SUBMIT REPORT
                </button>
            </form>
        </div>
        
        <div class="nav">
            <a href="/tracking/">📋 MY REPORTS</a>
            <a href="/" class="active">📍 REPORT ISSUE</a>
            <a href="/tracking/profile/">👤 PROFILE</a>
        </div>
    </div>
    
    <script src="{% static 'reports/script.js' %}"></script>
</body>
</html>
